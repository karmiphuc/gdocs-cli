# gitleaks config — local extension for OAuth-helper repos
[extend]
useDefault = true
[allowlist]
paths = [
  '''gdoc_tool\.py$''',
  '''setup_oauth\.py$''',
  '''README\.md$''',
  '''AGENTS\.md$'''
]
regexes = [
  '''creds_data\[["']client_secret["']\]''',
  '''creds_data\[["']refresh_token["']\]''',
  '''client_secret\.json''',
  '''find_client_secret''',
  '''client_secret=creds_data'''
]
description = "Allow OAuth helper scaffolding in gdocs-cli"